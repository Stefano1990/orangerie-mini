services:
  db:
    image: postgres:16
    container_name: orangerie_db
    environment:
      POSTGRES_DB: orangerie_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - orangerie_pgdata:/var/lib/postgresql/data

volumes:
  orangerie_pgdata:
    driver: local
