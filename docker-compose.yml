services:
  db:
    image: postgres:16
    container_name: orangerie_db
    environment:
      POSTGRES_DB: orangerie_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5500:5500
    volumes:
      - orangerie_pgdata:/var/lib/postgresql/data
    command: -p 5500

volumes:
  orangerie_pgdata:
    driver: local
